name: Resolve Progress Comment
description: 若已知 comment id 則沿用；否則在 issue 上建立一則新的進度留言。

inputs:
  issue_number:
    description: 目標 Issue 編號
    required: true
  comment_id:
    description: 已存在的進度留言 ID；若提供則直接沿用，不重新建立
    required: false
    default: ''
  message:
    description: 留言的純文字內容（允許換行）。
    required: true
  brain_meta:
    description: 附加於進度留言的 brain metadata 字串
    required: false
    default: '<!-- githubclaw-brain-result: {"source":"githubclaw-worker-brain"} -->'

runs:
  using: composite
  steps:
    - name: 解析或建立進度留言
      id: resolve
      shell: bash
      env:
        ISSUE_NUMBER: ${{ inputs.issue_number }}
        COMMENT_ID: ${{ inputs.comment_id }}
        MESSAGE: ${{ inputs.message }}
        GH_TOKEN: ${{ github.token }}
        REPOSITORY: ${{ github.repository }}
        BRAIN_META: ${{ inputs.brain_meta }}
      run: |
        set -euo pipefail

        message_file="${RUNNER_TEMP}/update-issue-comment-body-$$.json"

        # 透過 Node.js 從環境變數讀取 message 並序列化為 JSON，
        # 以安全處理換行、Unicode 及 shell 特殊字元。
        node -e "process.stdout.write(JSON.stringify({body: process.env.MESSAGE, brain_meta: process.env.BRAIN_META}))" \
          > "${message_file}"

        # 發送 API 請求，最多重試 5 次。
        attempt=1; exit_code=0; max_attempts=5
        while true; do
          if response="$(gh api \
            --method POST \
            -H 'Accept: application/vnd.github+json' \
            "/repos/${REPOSITORY}/issues/${ISSUE_NUMBER}/comments" \
            --input "${message_file}")"; then
            break
          else
            exit_code=$?
          fi
          if (( attempt >= max_attempts )); then
            rm -f "${message_file}"
            exit "${exit_code}"
          fi
          echo "::warning::gh api 失敗（第 ${attempt}/${max_attempts} 次），6 秒後重試..."
          sleep 6
          attempt=$(( attempt + 1 ))
        done

        rm -f "${message_file}"

        # gh api 失敗時已由 retry 機制處理，此處直接抽取 id。
        echo "comment_id=$(printf '%s' "${response}" | jq -r '.id')" >> "$GITHUB_OUTPUT"
